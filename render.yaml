# ============================================
# Render Configuration - Virtual Tourist (2026)
# ============================================
# Documentation: https://render.com/docs/infrastructure-as-code
# ============================================

services:
  # ============================================
  # BACKEND API SERVICE
  # ============================================
  - type: web
    name: virtual-tourist-api
    env: node
    region: oregon
    plan: free
    branch: main
    rootDir: server
    
    # Build & Start
    buildCommand: npm install
    startCommand: npm start
    
    # Health Check
    healthCheckPath: /health
    healthCheckTimeout: 180
    
    # Scaling (paid plans)
    # numInstances: 1
    # autoScaling:
    #   minInstances: 1
    #   maxInstances: 3
    
    # Environment Variables
    envVars:
      # Core
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      
      # Database (sync from Render Dashboard or use Atlas)
      - key: MONGODB_URI
        sync: false
      
      # Authentication
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      
      # CORS
      - key: CLIENT_URL
        value: https://virtual-tourist.netlify.app
      - key: CORS_ORIGIN
        value: https://virtual-tourist.netlify.app
      
      # Rate Limiting (stricter for production)
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      
      # Logging
      - key: LOG_LEVEL
        value: info
      
      # Email (optional)
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      
      # Cloudinary (optional)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      
      # Stripe (optional)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      
      # Feature Flags
      - key: ENABLE_EMAIL_VERIFICATION
        value: false
      - key: ENABLE_PAYMENT
        value: false
      - key: ENABLE_SOCIAL_FEATURES
        value: true

    # Disk (optional, for file uploads)
    # disk:
    #   name: uploads
    #   mountPath: /app/uploads
    #   sizeGB: 5

  # ============================================
  # WORKER SERVICE (Background Jobs)
  # ============================================
