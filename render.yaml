  #   envVars:
  #     - key: MONGODB_URI
  #       sync: false
  #     - key: BACKUP_BUCKET
  #       sync: false
  
  # Weekly cleanup job
  # - type: cron
  #   name: virtual-tourist-cleanup
  #   env: node
  #   rootDir: server
  #   buildCommand: npm install
  #   startCommand: node scripts/cleanup.js
  #   schedule: "0 3 * * 0"  # Weekly on Sunday at 3 AM UTC

  # ============================================
  # REDIS (Optional - for caching)
  # ============================================
